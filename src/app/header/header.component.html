<header class="hatch-header">
  <div class="header-left">
    <!-- HATCH Red Logo text style -->
    <div class="brand-logo">
      <img src="assets/hatch.png" alt="Hatch Logo" class="brand-logo-img" />
    </div>
    <div class="divider"></div>
    <div class="app-title-group">
      <h1>Student Intern Hub</h1>
      <span class="app-subtitle">Corporate Management Portal</span>
    </div>
  </div>

  <div class="header-right">

    <!-- User Profile Badge matching screenshot style -->
    <div class="user-profile">
      <div class="profile-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
        @if (userEmail) {
          <span class="user-email">{{ userEmail }}</span>
        }
      </div>
      <div class="user-avatar-badge">
        <span>{{ userName.split(' ').map(part => part[0]).join('').slice(0, 2).toUpperCase() }}</span>
      </div>
    </div>

    @if (showLogout) {
      <button type="button" class="logout-btn" (click)="logoutClicked.emit()">Logout</button>
    }
  </div>
</header>
